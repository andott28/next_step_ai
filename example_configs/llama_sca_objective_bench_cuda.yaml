model_name: "unsloth/Meta-Llama-3.1-8B-bnb-4bit"
output_dir: "experiments/llama_sca_objective_v1"
seed: 42
task_id: 0

dataset_name: "wikitext"
dataset_config: "wikitext-2-raw-v1"
dataset_split: "train"
text_column: "text"
max_samples: 0

max_seq_length: 128
batch_size: 1
grad_accum: 4
max_steps: 1000
log_every: 1
save_every: 200

lr: 0.0002
weight_decay: 0.01
warmup_lr_steps: 100
max_grad_norm: 1.0
kl_temperature: 1.0
static_mode: false

sca_block_size: 32
sca_block_rank: 4
sca_top_k: 3
sca_sigma: 1.0
sca_refractory_steps: 100
sca_inhibition_lambda: 0.0
sca_use_cuda: false
sca_spmm_impl: "cuda_spmm"
sca_soft_mask: true

biological_targets:
  active_block_ratio: 0.0234375
  refractory_violation_rate: 0.0
  pattern_instability: 0.0
  biological_active_ratio: 0.50
  weights:
    active_block_ratio: 1.0
    refractory_violation_rate: 1.0
    pattern_instability: 2.0
    biological_active_ratio: 0.0

objective:
  alpha_init: 0.80
  beta_init: 0.10
  gamma_init: 0.05
  delta_init: 0.05

  alpha_min: 0.45
  alpha_max: 0.95
  beta_min: 0.01
  beta_max: 0.45
  gamma_min: 0.01
  gamma_max: 0.20
  delta_min: 0.01
  delta_max: 0.20

  warmup_steps: 10
  ema_decay: 0.98
  update_interval: 5

  target_ppl_drift: 0.03
  target_kl: 0.08
  target_entropy: 0.0
  target_bio: 0.10

  pid_kp: 0.25
  pid_ki: 0.05
  pid_kd: 0.03
  stability_priority_lambda: 1.0
  static_mode: false
  max_pid_output: 2.0
  max_stability_error: 50.0
