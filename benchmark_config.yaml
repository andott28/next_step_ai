# Benchmark Configuration System
# Comprehensive configuration for flexible benchmarking scenarios

# General Configuration
general:
  name: "Comprehensive Benchmark Suite"
  description: "Flexible benchmarking system for academic and biological evaluations"
  version: "1.0.0"
  timestamp_format: "%Y%m%d_%H%M%S"
  
# Benchmark Selection
benchmarks:
  # Academic Benchmarks
  glue:
    enabled: true
    description: "General Language Understanding Evaluation"
    datasets:
      cola:
        enabled: true
        description: "Corpus of Linguistic Acceptability"
        max_samples: 100
        subset: "validation"
      sst2:
        enabled: true
        description: "Stanford Sentiment Treebank 2"
        max_samples: 100
        subset: "validation"
      mrpc:
        enabled: true
        description: "Microsoft Research Paraphrase Corpus"
        max_samples: 100
        subset: "validation"
      qqp:
        enabled: true
        description: "Quora Question Pairs"
        max_samples: 100
        subset: "validation"
      stsb:
        enabled: true
        description: "Semantic Textual Similarity Benchmark"
        max_samples: 100
        subset: "validation"
      mnli:
        enabled: true
        description: "Multi-Genre Natural Language Inference"
        max_samples: 100
        subset: "validation_matched"
      qnli:
        enabled: true
        description: "Question- Natural Language Inference"
        max_samples: 100
        subset: "validation"
      rte:
        enabled: true
        description: "Recognizing Textual Entailment"
        max_samples: 100
        subset: "validation"
    metrics:
      accuracy:
        enabled: true
        description: "Classification accuracy"
      f1:
        enabled: true
        description: "F1 score"
        average: "weighted"
      matthews_correlation:
        enabled: true
        description: "Matthews correlation coefficient"
      pearsonr:
        enabled: true
        description: "Pearson correlation coefficient"
      spearmanr:
        enabled: true
        description: "Spearman correlation coefficient"

  superglue:
    enabled: true
    description: "SuperGLUE benchmark"
    datasets:
      boolq:
        enabled: true
        description: "BoolQ - Boolean Questions"
        max_samples: 100
        subset: "validation"
      cb:
        enabled: true
        description: "CommitmentBank"
        max_samples: 100
        subset: "validation"
      copa:
        enabled: true
        description: "Choice of Plausible Alternatives"
        max_samples: 100
        subset: "validation"
      multirc:
        enabled: true
        description: "Multi-Sentence Reading Comprehension"
        max_samples: 100
        subset: "validation"
      record:
        enabled: true
        description: "ReCoRD - Reading Comprehension from Descriptions"
        max_samples: 100
        subset: "validation"
      rte:
        enabled: true
        description: "Recognizing Textual Entailment"
        max_samples: 100
        subset: "validation"
      wic:
        enabled: true
        description: "Words in Context"
        max_samples: 100
        subset: "validation"
      winogrande:
        enabled: true
        description: "Winograd Schema Challenge"
        max_samples: 100
        subset: "winogrande_debiased"
    metrics:
      accuracy:
        enabled: true
        description: "Classification accuracy"
      f1:
        enabled: true
        description: "F1 score"
        average: "weighted"

  # Question Answering Benchmarks
  qa:
    enabled: true
    description: "Question Answering benchmarks"
    datasets:
      squad:
        enabled: true
        description: "Stanford Question Answering Dataset"
        max_samples: 100
        subset: "validation"
      squad_v2:
        enabled: true
        description: "SQuAD 2.0"
        max_samples: 100
        subset: "validation"
      natural_questions:
        enabled: true
        description: "Natural Questions"
        max_samples: 100
        subset: "validation"
      hotpotqa:
        enabled: true
        description: "HotpotQA - Multi-hop QA"
        max_samples: 100
        subset: "validation"
    metrics:
      exact_match:
        enabled: true
        description: "Exact match score"
      f1:
        enabled: true
        description: "F1 score"
      squad:
        enabled: true
        description: "SQuAD evaluation"

  # Reasoning Benchmarks
  reasoning:
    enabled: true
    description: "Reasoning benchmarks"
    datasets:
      hellaswag:
        enabled: true
        description: "HellaSwag - Common sense reasoning"
        max_samples: 100
        subset: "validation"
      piqa:
        enabled: true
        description: "Physical Commonsense Questions"
        max_samples: 100
        subset: "validation"
      winogrande:
        enabled: true
        description: "Winograd Schema Challenge"
        max_samples: 100
        subset: "winogrande_debiased"
      mmlu:
        enabled: true
        description: "Massive Multitask Language Understanding"
        max_samples: 100
        subset: "validation"
      arc:
        enabled: true
        description: "AI2 Reasoning Challenge"
        max_samples: 100
        subset: "validation"
      triviaqa:
        enabled: true
        description: "TriviaQA"
        max_samples: 100
        subset: "validation"
    metrics:
      accuracy:
        enabled: true
        description: "Classification accuracy"

  # Code Benchmarks
  code:
    enabled: true
    description: "Code understanding and generation"
    datasets:
      humaneval:
        enabled: true
        description: "HumanEval - Python code generation"
        max_samples: 100
        subset: "test"
      mbpp:
        enabled: true
        description: "Mostly Basic Python Programming"
        max_samples: 100
        subset: "test"
      codeparrot:
        enabled: true
        description: "CodeParrot - Python code"
        max_samples: 100
        subset: "validation"
      code_x_glue:
        enabled: true
        description: "CodeXGLUE - Code understanding"
        max_samples: 100
        subset: "validation"
    metrics:
      accuracy:
        enabled: true
        description: "Code accuracy"
      codebleu:
        enabled: true
        description: "CodeBLEU score"
      pass_at_k:
        enabled: true
        description: "Pass@k metric"
        k: 1

  # Summarization Benchmarks
  summarization:
    enabled: true
    description: "Text summarization benchmarks"
    datasets:
      cnn_dailymail:
        enabled: true
        description: "CNN/Daily Mail News Summarization"
        max_samples: 100
        subset: "3.0.0"
      xsum:
        enabled: true
        description: "XSum - Extreme Summarization"
        max_samples: 100
        subset: "validation"
      samsum:
        enabled: true
        description: "SAMSum - Dialogue Summarization"
        max_samples: 100
        subset: "validation"
      gigaword:
        enabled: true
        description: "Gigaword - News Summarization"
        max_samples: 100
        subset: "validation"
    metrics:
      rouge:
        enabled: true
        description: "ROUGE scores"
        rouge_types: ["rouge1", "rouge2", "rougeL"]
      bleu:
        enabled: true
        description: "BLEU score"
      meteor:
        enabled: true
        description: "METEOR score"

  # Biological Benchmarks (Custom)
  biological:
    enabled: true
    description: "Biological-specific evaluation benchmarks"
    categories:
      protein_folding:
        enabled: true
        description: "Protein folding prediction"
        max_samples: 100
        prompts_file: "prompts/protein_folding.txt"
      drug_discovery:
        enabled: true
        description: "Drug discovery and molecular design"
        max_samples: 100
        prompts_file: "prompts/drug_discovery.txt"
      gene_analysis:
        enabled: true
        description: "Gene sequence analysis"
        max_samples: 100
        prompts_file: "prompts/gene_analysis.txt"
      medical_diagnosis:
        enabled: true
        description: "Medical diagnosis assistance"
        max_samples: 100
        prompts_file: "prompts/medical_diagnosis.txt"
      bioinformatics:
        enabled: true
        description: "Bioinformatics tasks"
        max_samples: 100
        prompts_file: "prompts/bioinformatics.txt"
    metrics:
      biological_accuracy:
        enabled: true
        description: "Domain-specific accuracy"
      relevance_score:
        enabled: true
        description: "Relevance to biological domain"
      completeness:
        enabled: true
        description: "Completeness of biological information"
      scientific_validity:
        enabled: true
        description: "Scientific validity score"

# Model Configuration
models:
  gpt2_large:
    enabled: true
    name: "GPT-2 Large"
    path: "gpt2-large"
    type: "baseline"
    parameters:
      max_length: 512
      temperature: 0.7
      top_p: 0.9
      num_return_sequences: 1
      pad_token_id: 50256

  neuroplastic_transformer:
    enabled: true
    name: "Neuroplastic Transformer"
    path: "models/neuroplastic_adapter_agi/final_model"
    type: "neuroplastic"
    parameters:
      max_length: 512
      temperature: 0.7
      top_p: 0.9
      num_return_sequences: 1
      pad_token_id: 50256
      biological_mode: true
      adaptation_strength: 0.8

  custom_models:
    enabled: false
    description: "Additional custom models can be added here"
    model1:
      enabled: false
      name: "Custom Model 1"
      path: "path/to/model1"
      type: "custom"
      parameters:
        max_length: 512
        temperature: 0.7

# Statistical Configuration
statistics:
  confidence_level: 0.95
  number_of_runs: 3
  cross_validation:
    enabled: false
    folds: 5
  bootstrap:
    enabled: true
    samples: 1000
    confidence_interval: 0.95
  significance_tests:
    enabled: true
    tests: ["t_test", "mann_whitney", "wilcoxon"]
    alpha: 0.05

# Output Configuration
output:
  results_directory: "results"
  logging:
    level: "INFO"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: "logs/benchmark.log"
  reporting:
    formats: ["json", "csv", "markdown"]
    include_plots: true
    plot_formats: ["png", "pdf"]
  save_intermediate: true
  cleanup_temp_files: true

# Performance Configuration
performance:
  batch_size: 8
  max_memory_gb: 8
  timeout_seconds: 300
  parallel_processing: true
  num_workers: 4
  cache_enabled: true
  cache_directory: "cache"

# Biological-Specific Configuration
biological:
  enabled: true
  domain_knowledge:
    protein_databases: ["PDB", "UniProt"]
    drug_databases: ["DrugBank", "ChEMBL"]
    gene_databases: ["GenBank", "Ensembl"]
  evaluation_criteria:
    accuracy_threshold: 0.8
    relevance_threshold: 0.7
    completeness_threshold: 0.75
  prompt_templates:
    protein_folding: "Predict the 3D structure of the following protein sequence: {sequence}"
    drug_discovery: "Design a potential drug molecule for the following target: {target}"
    gene_analysis: "Analyze the following gene sequence for potential mutations: {sequence}"
    medical_diagnosis: "Based on the following symptoms, provide a differential diagnosis: {symptoms}"
    bioinformatics: "Perform the following bioinformatics analysis on the sequence: {analysis_type}"

# Validation Configuration
validation:
  enabled: true
  sanity_checks: true
  data_quality_checks: true
  model_compatibility_checks: true
  statistical_validity_checks: true
  output_format_checks: true
  custom_validators: []
  fail_on_error: true
  continue_on_warning: false

# Experimental Configuration
experimental:
  enabled: false
  features:
    streaming_evaluation: false
    adaptive_batching: false
    real_time_monitoring: false
    automated_hyperparameter_tuning: false
  parameters:
    learning_rate: 0.001
    batch_size: 16
    epochs: 10